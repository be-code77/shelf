<title>My Shelf</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #f7f3ec;
  font-family: 'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif;
}

.app {
  position: relative;
  width: 100vw;
  height: 100vh;
  max-width: 390px;
  max-height: 844px;
  margin: 0 auto;
  overflow: hidden;
}

.bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}

:root {
  --shelf-y: 305px; /* 棚板上面のY座標 - ここだけ変えれば全本追従 */
}

.book {
  position: absolute;
  z-index: 2;
  height: 212px;
  width: auto;
  display: block;
  cursor: pointer;
  transform-origin: bottom center;
  transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
}

.book:hover { transform: translateY(-12px); }
.book:active { transform: translateY(-20px) scale(1.03); }

.book-diary   { left: 0px;   top: calc(var(--shelf-y) - 212px); }
.book-lyrics  { left: 38px;  top: calc(var(--shelf-y) - 212px); }
.book-poem    { left: 93px;  top: calc(var(--shelf-y) - 212px); }
.book-suno    { left: 163px; top: calc(var(--shelf-y) - 212px); }
.book-thought { left: 238px; top: calc(var(--shelf-y) - 231px); }
.book-idea    { left: 274px; top: calc(var(--shelf-y) - 226px); }

/* ヘッダー */
#header {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  padding: 54px 22px 0;
  pointer-events: none;
}
.h-main { font-size: 15px; font-weight: 400; color: rgba(50,42,36,.6); letter-spacing: .5px; }
.h-sub  { font-size: 9px; color: rgba(80,70,60,.38); letter-spacing: 2px; margin-top: 2px; font-family: 'Hiragino Sans', sans-serif; font-weight: 300; }

/* ボトムナビ */
#bottom-nav {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: 16px 40px 36px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.nav-btn { background: none; border: none; cursor: pointer; padding: 8px; color: rgba(80,70,60,.38); }
.nav-center { width: 36px; height: 4px; background: rgba(80,70,60,.15); border-radius: 2px; }

/* フォルダビュー */
#folder-view {
  position: fixed; inset: 0;
  background: #faf8f4;
  z-index: 20;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform .42s cubic-bezier(.32,.72,0,1);
}
#folder-view.open { transform: translateY(0); }

.fv-header {
  padding: 54px 22px 16px;
  display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid rgba(170,162,150,.15);
}
.fv-back  { background: none; border: none; font-size: 20px; cursor: pointer; color: rgba(90,80,70,.5); font-family: serif; }
.fv-title { font-size: 20px; font-weight: 400; color: #3b332e; letter-spacing: 1px; flex: 1; }
.fv-new   { background: none; border: 1px solid rgba(150,140,128,.35); border-radius: 16px; padding: 5px 13px; font-size: 11px; color: rgba(80,70,60,.6); cursor: pointer; font-family: inherit; letter-spacing: .5px; }

.fv-list { flex: 1; overflow-y: auto; padding: 20px 22px; -webkit-overflow-scrolling: touch; }

.memo-row { padding: 15px 0; border-bottom: 1px solid rgba(170,162,150,.12); cursor: pointer; display: flex; align-items: baseline; gap: 10px; }
.memo-row:active { opacity: .6; }
.memo-row-title { font-size: 15px; color: rgba(55,45,37,.78); flex: 1; line-height: 1.5; }
.memo-row-date  { font-size: 9px; color: rgba(110,100,90,.45); letter-spacing: 1.2px; font-family: 'Hiragino Sans', sans-serif; font-weight: 300; }
.memo-empty { text-align: center; margin-top: 70px; font-size: 12px; letter-spacing: 2px; color: rgba(110,100,90,.35); font-family: 'Hiragino Sans', sans-serif; font-weight: 300; }

/* エディター */
#editor-view {
  position: fixed; inset: 0;
  background: #faf8f4;
  z-index: 30;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform .4s cubic-bezier(.32,.72,0,1);
}
#editor-view.open { transform: translateY(0); }

.ev-header { padding: 52px 20px 10px; display: flex; align-items: center; gap: 10px; }
.ev-back   { background: none; border: none; font-size: 18px; cursor: pointer; color: rgba(90,80,70,.45); font-family: serif; }

<script>
const FOLDERS = [
  { id:'f1', name:'歌詞' },
  { id:'f2', name:'詩' },
  { id:'f3', name:'Sunoの記録' },
  { id:'f4', name:'日記の断片' },
  { id:'f5', name:'思考のメモ' },
  { id:'f6', name:'アイデアのかけら' },
];

let S = (() => {
  const d = localStorage.getItem('shelf-memo');
  if (d) return JSON.parse(d);
  return { memos: [] };
})();

function persist() { localStorage.setItem('shelf-memo', JSON.stringify(S)); }

let currentFolder = null;
let currentMemo   = null;
let saveTimer     = null;

// 本タップ
document.querySelectorAll('.book').forEach(el => {
  el.addEventListener('click', () => {
    const id = el.dataset.id;
    openFolder(id);
  });
});

function openFolder(id) {
  currentFolder = FOLDERS.find(f => f.id === id);
  document.getElementById('fv-title').textContent = currentFolder.name;
  renderMemoList();
  document.getElementById('folder-view').classList.add('open');
}

function closeFolder() {
  document.getElementById('folder-view').classList.remove('open');
  currentFolder = null;
}

function renderMemoList() {
  const list = document.getElementById('fv-list');
  const memos = S.memos.filter(m => m.folderId === currentFolder.id)
    .sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  list.innerHTML = '';
  if (!memos.length) { list.innerHTML = '<div class="memo-empty">まだ何もない</div>'; return; }
  memos.forEach(m => {
    const row = document.createElement('div');
    row.className = 'memo-row';
    const d = new Date(m.updatedAt);
    row.innerHTML = `<div class="memo-row-title">${m.title || '無題'}</div><div class="memo-row-date">${d.getMonth()+1}.${d.getDate()}</div>`;
    row.onclick = () => openEditor(m.id);
    list.appendChild(row);
  });
}

function newMemo() {
  const m = { id: Date.now().toString(), folderId: currentFolder.id, title: '', content: '', updatedAt: new Date().toISOString() };
  S.memos.push(m); persist(); openEditor(m.id);
}

function openEditor(id) {
  currentMemo = S.memos.find(m => m.id === id);
  document.getElementById('ev-title').value   = currentMemo.title;
  document.getElementById('ev-content').value = currentMemo.content;
  updateCount();
  document.getElementById('ev-saved').textContent = '';
  document.getElementById('editor-view').classList.add('open');
}

function closeEditor() {
  document.getElementById('editor-view').classList.remove('open');
  if (currentFolder) renderMemoList();
}

function autoSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    if (!currentMemo) return;
    currentMemo.title   = document.getElementById('ev-title').value;
    currentMemo.content = document.getElementById('ev-content').value;
    currentMemo.updatedAt = new Date().toISOString();
    persist();
    document.getElementById('ev-saved').textContent = '保存済み';
    setTimeout(() => document.getElementById('ev-saved').textContent = '', 2000);
  }, 700);
}

function updateCount() {
  document.getElementById('ev-count').textContent = document.getElementById('ev-content').value.length;
}

  function startWalking() {
    const goRightFirst = Math.random() > 0.5;
    bug.src = goRightFirst ? WALK_RIGHT : WALK_LEFT;
    bug.style.width = '44px';
    // 穴の位置から出てくる
    bug.style.left = '190px';
    bug.style.top = '580px';
    bug.style.transition = 'none';
    let steps = 0;
    const tableY = 730;
    bugX = 190; bugY = 580;
    setTimeout(() => {
      moveTo(bugX, tableY, 1200, () => {
        walkInterval = setInterval(() => {
          steps++;
          if (steps > 12) {
            clearInterval(walkInterval);
            walkToPlant();
            return;
          }
          const goRight = Math.random() > 0.5;
          bug.src = goRight ? WALK_RIGHT : WALK_LEFT;
          const nx = bugX + (goRight ? Math.random() * 40 : -Math.random() * 40);
          const ny = tableY + (Math.random() * 10 - 5);
          bugX = Math.max(20, Math.min(340, nx));
          moveTo(bugX, ny, 600 + Math.random() * 400);
        }, 900);
      });
    }, 300);
  }
